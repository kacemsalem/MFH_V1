version: "3.9"

services:

  django:
    build: ./mfh_django
    container_name: mfh_django
    volumes:
      - ./mfh_django:/app
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000

  react:
    build: ./mfh_react
    container_name: mfh_react
    volumes:
      - ./mfh_react:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host